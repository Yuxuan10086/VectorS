# 开发时建议 ros2 直接加载本文件路径，避免只改源码未 colcon 时读到旧 install 副本。
/**:
  ros__parameters:
    # 限位相对碰撞点向内收缩（脉冲，51200 一圈）
    limit_margin_units: 512

    motor_z_id: 1
    motor_j1_id: 3
    motor_j2_id: 2
    # Z 碰停：第一个 bump（dir=0 正向）与第二个 bump（dir=1 反向）相电流阈值 mA；
    # 常见对应上升 / 下降负载不同，请按丝杆/重力方向核对 bump 与「上升」是否一致
    torque_z_up_ma: 2000
    torque_z_down_ma: 1000
    torque_j1_ma: 1500
    torque_j2_ma: 1000

    # 堵转保护电流（mA，0~3000）；与各电机构造时 enable_stall_protection 一致
    stall_current_z_ma: 1500
    stall_current_j1_ma: 2000
    stall_current_j2_ma: 1500

    # 通信位置 set_absolute_position：各关节转速（rpm）与加速度档（0~255）
    position_speed_rpm_z: 100
    position_speed_rpm_j1: 40
    position_speed_rpm_j2: 100
    position_accel_z: 20
    position_accel_j1: 20
    position_accel_j2: 20

    # 碰停标定速度（rpm）；加速度档复用 position_accel_*
    bump_speed_rpm_z: 60
    bump_speed_rpm_j1: 40
    bump_speed_rpm_j2: 60

    # 用户侧最大行程（标定自行定义单位：毫米、角度等）
    span_z: 100.0
    span_joint1: 180.0
    span_joint2: 180.0
